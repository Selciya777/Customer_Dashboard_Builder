# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/ordersdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234567

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
